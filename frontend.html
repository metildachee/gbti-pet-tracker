<!DOCTYPE html>
<html>
<head>
    <title>Pet Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f7f1e3;
            color: #3b2f2f;
        }

        .header {
            background: linear-gradient(135deg, #d9884e, #c26d3b);
            color: white;
            padding: 22px;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            display: grid;
            gap: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #f0c27b;
        }

        .chart-small {
            max-width: 280px;
            max-height: 280px;
            width: 100%;
            height: 260px;
            margin: auto;
        }
        
        .timeline-controls {
            margin-bottom: 6px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .timeline-btn {
            background: #f0c27b;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .timeline-btn.active {
            background: #8c4b2f;
            color: white;
        }

        .timeline-hint {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
            margin-bottom: 10px;
        }

        .timeline {
            display: grid;
            width: 100%;
            max-width: 100%;
            gap: 4px;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d2d2d;
            transition: 0.2s;
            user-select: none;
        }
        
        .grid-24 {
            grid-template-columns: repeat(12, 1fr);
        }

        .grid-7 {
            grid-template-columns: repeat(7, 1fr);
        }

        .grid-31 {
            grid-template-columns: repeat(7, 1fr);
        }

        .grid-12 {
            grid-template-columns: repeat(6, 1fr);
        }

        .cell:hover {
            transform: scale(1.05);
        }

        button {
            background: #d9884e;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            margin-right: 6px;
            cursor: pointer;
        }

        .quiz-option {
            display: block;
            margin: 6px 0;
        }

        .result {
            margin-top: 10px;
            font-weight: bold;
        }
        
        /* Recent Meals Styles */
        .meal-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #f9f9f9;
            border-left: 4px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .meal-info {
            flex: 1;
        }
        
        .meal-time {
            font-weight: bold;
            color: #666;
            font-size: 14px;
        }
        
        .meal-food {
            font-size: 16px;
            margin: 5px 0;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .risk-low {
            background: #d4edda;
            color: #155724;
            border-color: #28a745;
        }
        
        .risk-medium {
            background: #fff3cd;
            color: #856404;
            border-color: #ffc107;
        }
        
        .risk-high {
            background: #f8d7da;
            color: #721c24;
            border-color: #dc3545;
        }
        
        .video-btn {
            background: #4a90e2;
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .video-btn:hover {
            background: #357abd;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        
        .modal-content {
            position: relative;
            background-color: #fff;
            margin: 5% auto;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            border-radius: 10px;
        }
        
        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }
        
        .close:hover {
            color: #000;
        }
        
        video {
            width: 100%;
            border-radius: 8px;
        }
        
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="header" id="header">Loading...</div>

<div class="container">

    <!-- TOP INFO -->
    <div class="grid">
        <div class="card">
            <div class="title">Health Status</div>
            <div id="health"></div>
        </div>

        <div class="card">
            <div class="title">Total Intake</div>
            <div id="intake"></div>
        </div>
    </div>
    
    <!-- NEW: Recent Meals Section -->
    <div class="card">
        <div class="title">🍽️ Recent Meals (Last 4 Days)</div>
        <div id="recentMeals"></div>
    </div>

    <!-- CHARTS -->
    <div class="grid">

        <div class="card">
            <div class="title">Diet Breakdown</div>
            <canvas id="pieChart" class="chart-small"></canvas>
        </div>

        <div class="card">
            <div class="title">Intake Distribution</div>
            <canvas id="barChart"></canvas>
        </div>

    </div>

    <!-- TIMELINE -->
    <div class="card">
        <div class="title">Timeline</div>

        <div class="timeline-controls">
            <button class="timeline-btn active" onclick="setMode('day', this)">Day</button>
            <button class="timeline-btn" onclick="setMode('week', this)">Week</button>
            <button class="timeline-btn" onclick="setMode('month', this)">Month</button>
            <button class="timeline-btn" onclick="setMode('year', this)">Year</button>
        </div>

        <div class="timeline-hint">
            Click to display aggregate. The darker the cell, the more food has been consumed.
        </div>

        <div class="timeline" id="timeline"></div>
    </div>

    <!-- PERSONALITY TEST -->
    <div class="card">
        <div class="title">Personality Test</div>
        <div id="quiz"></div>
        <button onclick="submitQuiz()">Submit</button>
        <div id="result" class="result"></div>
    </div>

</div>

<!-- Video Modal -->
<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <video id="videoPlayer" controls autoplay>
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
</div>

<script>
const API = "http://127.0.0.1:5001";

let quizData = null;
let allRecords = []; // Store all records for recent meals

// --------------------
// Overview
// --------------------
fetch(`${API}/api/overview`)
.then(r => r.json())
.then(data => {
    document.getElementById("header").innerText = data.pet_name;
    document.getElementById("health").innerHTML =
        `<span class="badge">${data.health}</span>`;
    document.getElementById("intake").innerText =
        data.total_intake + " units";
});

// --------------------
// Fetch all records for recent meals
// --------------------
fetch(`${API}/api/summary`)
.then(r => r.json())
.then(data => {
    // Get records from a separate endpoint or store when loading
    return fetch(`${API}/api/records`);
})
.then(r => r.json())
.then(data => {
    allRecords = data.records || [];
    displayRecentMeals(allRecords);
})
.catch(err => {
    console.error("Could not load records:", err);
    displayRecentMeals([]);
});

// --------------------
// Display Recent Meals (Last 4 Days)
// --------------------
function displayRecentMeals(records) {
    const container = document.getElementById("recentMeals");
    
    if (!records || records.length === 0) {
        container.innerHTML = '<div class="no-data">No meal records available</div>';
        return;
    }
    
    // Sort records by time (most recent first)
    const sortedRecords = [...records].sort((a, b) => 
        new Date(b.time) - new Date(a.time)
    );
    
    // Get last 4 days of records (or all if less than 4 days)
    const now = new Date();
    const fourDaysAgo = new Date(now);
    fourDaysAgo.setDate(now.getDate() - 4);
    
    const recentRecords = sortedRecords.filter(record => 
        new Date(record.time) >= fourDaysAgo
    );
    
    if (recentRecords.length === 0) {
        container.innerHTML = '<div class="no-data">No meals in the last 4 days</div>';
        return;
    }
    
    // Group by day
    const groupedByDay = {};
    recentRecords.forEach(record => {
        const date = new Date(record.time).toLocaleDateString();
        if (!groupedByDay[date]) {
            groupedByDay[date] = [];
        }
        groupedByDay[date].push(record);
    });
    
    // Display each day
    let html = '';
    for (const [date, meals] of Object.entries(groupedByDay)) {
        html += `<div style="margin-bottom: 15px;"><strong>📅 ${date}</strong></div>`;
        
        meals.forEach(meal => {
            const time = new Date(meal.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const riskClass = `risk-${meal.risk ? meal.risk.toLowerCase() : 'low'}`;
            const riskText = meal.risk || 'Unknown';
            
            // Get border color based on risk
            let borderColor;
            switch(meal.risk?.toLowerCase()) {
                case 'high': borderColor = '#dc3545'; break;
                case 'medium': borderColor = '#ffc107'; break;
                default: borderColor = '#28a745';
            }
            
            html += `
                <div class="meal-item" style="border-left-color: ${borderColor}">
                    <div class="meal-info">
                        <div class="meal-time">🕒 ${time}</div>
                        <div class="meal-food">🍗 Ate: <strong>${meal.item}</strong></div>
                        <div>
                            <span class="risk-badge ${riskClass}">⚠️ Risk: ${riskText}</span>
                        </div>
                    </div>
                    <button class="video-btn" onclick="playVideo('${meal.video}')">
                        📹 Watch Video
                    </button>
                </div>
            `;
        });
    }
    
    container.innerHTML = html;
}

// --------------------
// Play video in modal
// --------------------
function playVideo(videoPath) {
    const modal = document.getElementById("videoModal");
    const videoPlayer = document.getElementById("videoPlayer");
    const videoSource = document.getElementById("videoSource");
    console.log(videoPath)
    
    // Use the video path directly or construct proper URL
    let videoUrl = videoPath;
    if (!videoUrl.startsWith('http')) {
        videoUrl = `${API}/video/${encodeURIComponent(videoPath)}`;
    }
    
    videoSource.src = videoUrl;
    videoPlayer.load();
    modal.style.display = "block";
    videoPlayer.play();
}

// Close modal when clicking X
document.querySelector('.close').onclick = function() {
    const modal = document.getElementById("videoModal");
    const videoPlayer = document.getElementById("videoPlayer");
    modal.style.display = "none";
    videoPlayer.pause();
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById("videoModal");
    if (event.target == modal) {
        modal.style.display = "none";
        videoPlayer.pause();
    }
}

// --------------------
// Summary + Charts
// --------------------
fetch(`${API}/api/summary`)
.then(r => r.json())
.then(data => {

    const labels = Object.keys(data.foods);
    const values = Object.values(data.foods);

    new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels,
            datasets: [{ data: values }]
        }
    });

    new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: "Intake",
                data: values
            }]
        }
    });
});

// --------------------
// Timeline
// --------------------
let currentBtn = null;

function setActive(btn) {
    if (currentBtn) currentBtn.classList.remove("active");
    btn.classList.add("active");
    currentBtn = btn;
}

function colorScale(value, max) {
    let intensity = value / max;
    return `rgba(34, 139, 34, ${0.15 + intensity * 0.85})`;
}

function loadTimeline(mode) {
    fetch(`${API}/api/timeline?mode=${mode}`)
    .then(r => r.json())
    .then(data => {

        const div = document.getElementById("timeline");
        div.innerHTML = "";

        const values = Object.values(data.data);
        const max = Math.max(...values, 1);

        div.className = "timeline";

        let items = [];
        let gridCols = 12;

        if (mode === "day") {
            gridCols = 12;

            for (let i = 0; i < 24; i++) {
                let start = String(i).padStart(2, "0") + ":00";
                let val = data.data[start] || 0;

                items.push({
                    label: `${start}`,
                    value: val
                });
            }
        }

        else if (mode === "week") {
            gridCols = 7;

            const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

            days.forEach(d => {
                items.push({
                    label: d,
                    value: data.data[d] || 0
                });
            });
        }

        else if (mode === "month") {
            gridCols = 7;

            for (let i = 1; i <= 31; i++) {
                let key = String(i).padStart(2, "0");

                items.push({
                    label: String(i),
                    value: data.data[key] || 0
                });
            }
        }

        else if (mode === "year") {
            gridCols = 6;

            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

            months.forEach(m => {
                items.push({
                    label: m,
                    value: data.data[m] || 0
                });
            });
        }

        div.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;

        items.forEach(item => {
            let cell = document.createElement("div");
            cell.className = "cell";
            cell.style.background = colorScale(item.value, max);
            cell.innerText = item.label;
            div.appendChild(cell);
        });
    });
}

loadTimeline("day");

function setMode(mode, btn) {
    setActive(btn);
    loadTimeline(mode);
}

// --------------------
// Personality Test
// --------------------
fetch(`${API}/api/personality`)
.then(r => r.json())
.then(data => {
    quizData = data;

    const quiz = document.getElementById("quiz");

    data.questions.forEach((q, i) => {

        const block = document.createElement("div");
        block.innerHTML = `<p><b>${q.question}</b></p>`;

        q.options.forEach(opt => {
            block.innerHTML += `
                <label class="quiz-option">
                    <input type="radio" name="q${i}" value="${opt}">
                    ${opt}
                </label>
            `;
        });

        quiz.appendChild(block);
    });
});

function submitQuiz() {
    let score = Math.random();

    let type =
        score < 0.25 ? "Energetic" :
        score < 0.5 ? "Calm" :
        score < 0.75 ? "Curious" :
        "Lazy";

    document.getElementById("result").innerText =
        "Personality: " + type;
}
</script>

</body>
</html>
