<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Pet Wellness</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="bg-blur"></div>

<div class="app">

    <!-- HERO -->
    <section class="hero" id="hero">

        <div class="hero-glow"></div>

        <div class="hero-top">

            <div>
                <div class="eyebrow">PET WELLNESS</div>
                <h1 id="header">Loading...</h1>
                <div class="subtitle" id="health"></div>
            </div>

            <div class="ring">
                <span id="healthScore">--</span>
            </div>

        </div>

        <div class="hero-stats">
            <div>
                <div id="intake" class="stat-number">--</div>
                <div class="stat-label">Total Intake</div>
            </div>

            <div>
                <div id="mealCount" class="stat-number">--</div>
                <div class="stat-label">Meals</div>
            </div>

            <div>
                <div id="safeRate" class="stat-number">--</div>
                <div class="stat-label">Safety</div>
            </div>
        </div>

    </section>

    <!-- INSIGHT -->
    <section class="card insight">
        <div class="spark">✨</div>
        <div id="insightText">Analyzing pet behavior...</div>
    </section>

    <!-- RECENT -->
    <section class="card">
        <h2>Recent Meals</h2>
        <div id="recentMeals"></div>
    </section>

    <!-- INSIGHTS -->
    <section class="grid">

        <div class="card">
            <h2>Diet Breakdown</h2>
            <div id="foodBars"></div>
        </div>

        <div class="card">
            <h2>Intake Trend</h2>
            <canvas id="barChart"></canvas>
        </div>

    </section>

    <!-- TIMELINE -->
    <section class="card">

        <h2>Activity Timeline</h2>

        <div class="timeline-controls">
            <button onclick="setMode('day', this)" class="active">Day</button>
            <button onclick="setMode('week', this)">Week</button>
            <button onclick="setMode('month', this)">Month</button>
            <button onclick="setMode('year', this)">Year</button>
        </div>

        <div id="timeline" class="timeline"></div>

    </section>

    <!-- QUIZ -->
    <section class="card">
        <h2>Personality</h2>
        <div id="quiz"></div>
        <button class="primary" onclick="submitQuiz()">Submit</button>
        <div id="result"></div>
    </section>

</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal">
    <div class="modal-box">
        <span class="close">&times;</span>
        <video id="videoPlayer" controls></video>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
